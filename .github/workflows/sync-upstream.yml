name: Sync Upstream Tags

# Polls scoltzero/TranScreen for new tags and mirrors them here.
# For each new semver tag, creates a fork-side release commit whose app source
# comes from upstream while the signing workflow/scripts come from this fork.
# Pushing that tag triggers .github/workflows/release.yml.

on:
  schedule:
    - cron: '17,47 * * * *'   # every 30 minutes
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Optional: a single upstream tag to (re)mirror, e.g. v1.2.0'
        required: false

env:
  UPSTREAM: https://github.com/scoltzero/TranScreen.git
  UPSTREAM_BRANCH: main
  TAG_PATTERN: '^v[0-9]+\.[0-9]+\.[0-9]+$'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT required so pushed tags trigger downstream workflows.
          # Default GITHUB_TOKEN cannot trigger other workflows.
          token: ${{ secrets.SYNC_PAT }}

      - name: Fetch upstream
        run: |
          set -euo pipefail
          git remote add upstream "$UPSTREAM" 2>/dev/null || git remote set-url upstream "$UPSTREAM"
          git fetch upstream --tags --prune --no-tags
          git fetch upstream "refs/tags/*:refs/tags/upstream/*"

      - name: Mirror branch (fast-forward only)
        run: |
          set -euo pipefail
          git fetch upstream "$UPSTREAM_BRANCH"
          git checkout "$UPSTREAM_BRANCH" 2>/dev/null || git checkout -b "$UPSTREAM_BRANCH" "upstream/$UPSTREAM_BRANCH"
          if git merge --ff-only "upstream/$UPSTREAM_BRANCH"; then
            git push origin "$UPSTREAM_BRANCH"
          else
            echo "::warning::Local $UPSTREAM_BRANCH has diverged from upstream; not fast-forwarding."
          fi

      - name: Mirror new tags
        env:
          FORCE_TAG: ${{ inputs.force_tag }}
        run: |
          set -euo pipefail
          existing_tags=$(git ls-remote --tags origin | awk '{print $2}' | sed 's#refs/tags/##' | grep -v '\^{}$' || true)

          if [ -n "${FORCE_TAG:-}" ]; then
            candidates="$FORCE_TAG"
          else
            candidates=$(git for-each-ref --format='%(refname:strip=3)' refs/tags/upstream/ | grep -E "$TAG_PATTERN" || true)
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          new_count=0
          for tag in $candidates; do
            if ! echo "$tag" | grep -Eq "$TAG_PATTERN"; then
              echo "::warning::Skipping $tag because it does not match $TAG_PATTERN"
              continue
            fi

            if [ -z "${FORCE_TAG:-}" ] && echo "$existing_tags" | grep -qx "$tag"; then
              echo "= $tag already mirrored"
              continue
            fi

            upstream_ref="refs/tags/upstream/$tag"
            upstream_sha=$(git rev-parse "$upstream_ref")
            echo "+ preparing signed-release tag $tag from upstream $upstream_sha"

            git checkout -B "signed-release/$tag" "$upstream_ref"
            git checkout "origin/$UPSTREAM_BRANCH" -- \
              .github/workflows/release.yml \
              build.sh \
              docs/RELEASING.md
            git add -f .github/workflows/release.yml build.sh docs/RELEASING.md

            if ! git diff --cached --quiet; then
              git commit -m "chore: prepare $tag signed release"
            fi

            release_sha=$(git rev-parse HEAD)
            git tag -f "$tag" "$release_sha"
            if [ -n "${FORCE_TAG:-}" ] && echo "$existing_tags" | grep -qx "$tag"; then
              git push origin ":refs/tags/$tag"
            fi
            git push origin "refs/tags/$tag"
            new_count=$((new_count + 1))
          done

          echo "Mirrored $new_count new tag(s)."
